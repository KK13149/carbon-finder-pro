name: Carbon Finder Pro

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: carbon-finder-deploy
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update materials database
        if: github.event_name != 'push'
        run: node scripts/update-materials.mjs

      - name: Validate JavaScript
        run: |
          node --check app.js
          node --check materials-data.js
          node --check scripts/update-materials.mjs

      - name: Commit scheduled data update
        if: github.event_name != 'push'
        run: |
          git config user.name "carbon-finder-bot"
          git config user.email "carbon-finder-bot@users.noreply.github.com"
          git add materials-data.js
          git diff --cached --quiet || git commit -m "Update carbon materials database"
          git push

      - name: Publish static site to gh-pages branch
        shell: bash
        run: |
          mkdir -p _site
          cp index.html styles.css app.js materials-data.js _site/
          touch _site/.nojekyll
          git config user.name "carbon-finder-bot"
          git config user.email "carbon-finder-bot@users.noreply.github.com"
          git switch --orphan gh-pages-deploy
          git rm -rf . >/dev/null 2>&1 || true
          cp -r _site/. .
          git add index.html styles.css app.js materials-data.js .nojekyll
          git commit -m "Deploy Carbon Finder Pro"
          git push -f origin HEAD:gh-pages
