name: Carbon Finder Pro

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update materials database
        if: github.event_name != 'push'
        run: node scripts/update-materials.mjs

      - name: Validate JavaScript
        run: |
          node --check app.js
          node --check materials-data.js
          node --check scripts/update-materials.mjs

      - name: Commit scheduled data update
        if: github.event_name != 'push'
        run: |
          git config user.name "carbon-finder-bot"
          git config user.email "carbon-finder-bot@users.noreply.github.com"
          git add materials-data.js
          git diff --cached --quiet || git commit -m "Update carbon materials database"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
